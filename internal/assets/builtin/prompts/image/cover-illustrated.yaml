name: cover-illustrated
kind: image
description: 插画感更强、更亲和的文章封面
version: "1.0"
archetype: cover
primary_use_case: cover
recommended_aspect_ratios:
  - 16:9
default_aspect_ratio: 16:9
metadata:
  author: geekjourneyx
  provenance: original
tags:
  - cover
  - illustration
  - friendly
examples:
  - 教育类文章
  - 生活方式文章
variables:
  - ARTICLE_TITLE
  - ARTICLE_SUMMARY
  - KEYWORDS
  - VISUAL_STYLE
  - ASPECT_RATIO
template: |
  为公众号文章生成温和、插画感强的封面图提示词。
  标题：{{ARTICLE_TITLE}}
  摘要：{{ARTICLE_SUMMARY}}
  关键词：{{KEYWORDS}}
  风格：{{VISUAL_STYLE}}
  画幅：{{ASPECT_RATIO}}

  要求：
  1. 画面友好、轻松、可读
  2. 优先使用插画、图形化元素表达
  3. 适合教育、生活、消费、经验分享类内容
