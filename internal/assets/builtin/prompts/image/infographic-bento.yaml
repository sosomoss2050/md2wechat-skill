name: infographic-bento
kind: image
description: 模块化总览型信息图
version: "1.0"
archetype: infographic
primary_use_case: infographic
recommended_aspect_ratios:
  - 3:4
  - 16:9
default_aspect_ratio: 3:4
metadata:
  author: geekjourneyx
  provenance: original
tags:
  - infographic
  - bento
  - overview
examples:
  - 多主题综述
  - 内容总览卡片墙
variables:
  - ARTICLE_TITLE
  - ARTICLE_SUMMARY
  - KEY_POINTS
  - VISUAL_STYLE
  - ASPECT_RATIO
template: |
  为文章生成 Bento Grid 风格的信息图提示词。
  标题：{{ARTICLE_TITLE}}
  摘要：{{ARTICLE_SUMMARY}}
  核心要点：{{KEY_POINTS}}
  风格：{{VISUAL_STYLE}}
  画幅：{{ASPECT_RATIO}}

  要求：
  1. 采用多个模块卡片组织信息
  2. 模块之间层级清晰、留白明确
  3. 适合总览、综述、多主题总结
