name: infographic-apple-keynote-premium
kind: image
description: 苹果发布会风格的信息图，也可兼作封面
version: "1.0"
archetype: infographic
primary_use_case: infographic
compatible_use_cases:
  - cover
recommended_aspect_ratios:
  - 3:4
  - 16:9
  - 21:9
default_aspect_ratio: 3:4
metadata:
  author: geekjourneyx
  provenance: original
tags:
  - infographic
  - cover
  - apple
  - keynote
  - premium
  - editorial
  - dark
examples:
  - 科技主题高端信息图
  - 商业观点总结图
  - 可兼作封面的发布会风横幅
variables:
  - ARTICLE_TITLE
  - ARTICLE_SUMMARY
  - KEY_POINTS
  - VISUAL_STYLE
  - ASPECT_RATIO
template: |
  为文章生成一张苹果发布会风格的信息图提示词，也可以兼作文章封面。画幅优先使用 {{ASPECT_RATIO}}，如果没有额外上下文，默认采用 3:4。

  内容输入：
  - 标题：{{ARTICLE_TITLE}}
  - 摘要：{{ARTICLE_SUMMARY}}
  - 核心要点：{{KEY_POINTS}}
  - 风格补充：{{VISUAL_STYLE}}
  - 画幅：{{ASPECT_RATIO}}

  风格目标：
  1. 画面必须体现 Apple keynote aesthetic、极简主义、巨大留白、层次分明、Premium materiality
  2. 背景始终为深邃纯黑，结合克制的彩色柔光光晕与极少量发光点缀
  3. 允许作为信息图，也允许作为文章封面，因此必须兼顾信息结构与标题视觉冲击
  4. 内容占比不超过 40%，让留白成为设计的一部分
  5. 需要有专业、冷静、电影级的发布会质感，但不要广告感或廉价科技感

  配色方案必须根据内容主题智能选择 1 套最适合的方案，并保持画面最多 2 种色相：
  1. 柔和蓝色主题：适合科技、商务、数据类
  2. 优雅紫色主题：适合创意、奢华、创新类
  3. 清新绿色主题：适合健康、可持续、成长类
  4. 温暖橙色主题：适合活力、热情、社交类
  5. 玫瑰粉色主题：适合生活、美妆、健康类
  6. 冷色青绿主题：适合金融、信任、稳定类
  7. 深靛蓝主题：适合高端、企业、权威类
  8. 中性灰色主题：适合极简、专业、通用类

  色彩使用原则：
  1. 深邃纯黑背景上，主标题必须使用纯白，正文使用高亮浅色，次要信息使用中亮度辅助色
  2. 光晕必须克制、低饱和，仅作为氛围，不干扰阅读
  3. 强调色只用于图标、点缀、微小几何元素，占比低于 10%
  4. 整体层次必须清楚：主标题 > 正文 > 次要信息
  5. 整体视觉效果要像高级发布会大屏与精致 editorial infographic 的结合

  内容布局要求：
  1. 根据信息内容智能决定最合适的布局，可以是模块化分区、对比结构、流程结构或摘要总览
  2. 主标题要明显大于副标题和说明文字三倍以上，像 Apple 发布会 keynote 的 hero 文案
  3. 使用网格排版和精确对齐，保证阅读流向清晰
  4. 文字与装饰元素比例协调，不要堆满信息
  5. 作为封面使用时，必须保留清晰的标题安全区；作为信息图使用时，必须保持模块逻辑顺畅

  视觉元素要求：
  1. 可使用发光圆角矩形图标、微妙几何线条、极低透明度的发光圆点
  2. 线条和装饰必须克制、精确、现代，像高端数字界面元素
  3. 可以模拟电子屏幕、应用界面或 keynote 大屏的信息呈现方式
  4. 允许中英文字体气质混搭，但不要生成杂乱无章的大量英文内容
  5. 不要日期、不要二维码、不要条形码、不要无关 logo、不要复杂拟物图标

  字体与版式气质：
  1. 主标题应呈现 SF Pro Display Heavy 的视觉气质
  2. 正文和辅助信息应呈现 SF Pro Text 的清晰理性气质
  3. 允许多尺寸层级和局部强调，但整体必须安静、优雅、有呼吸感
  4. 通过巨大留白、对齐、分区和柔光边缘，形成“苹果发布会”式高端视觉秩序

  负向约束：
  1. 不要低端科技蓝紫发光海报风，不要赛博朋克堆叠
  2. 不要彩虹色、不要高饱和撞色、不要超过 2 个主色相
  3. 不要花哨 3D 图标、不要复杂照片拼贴、不要强噪点
  4. 不要密集长段落，不要把整篇文章全文塞进图里
  5. 不要广告感、不要廉价营销页风格
