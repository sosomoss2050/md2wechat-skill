name: cover-metaphor
kind: image
description: 用视觉隐喻表达抽象主题的封面
version: "1.0"
archetype: cover
primary_use_case: cover
recommended_aspect_ratios:
  - 16:9
default_aspect_ratio: 16:9
metadata:
  author: geekjourneyx
  provenance: original
tags:
  - cover
  - metaphor
  - abstract
examples:
  - 认知升级
  - 管理与策略文章
variables:
  - ARTICLE_TITLE
  - ARTICLE_SUMMARY
  - KEYWORDS
  - VISUAL_STYLE
  - ASPECT_RATIO
template: |
  为公众号文章生成视觉隐喻型封面图提示词。
  标题：{{ARTICLE_TITLE}}
  摘要：{{ARTICLE_SUMMARY}}
  关键词：{{KEYWORDS}}
  风格：{{VISUAL_STYLE}}
  画幅：{{ASPECT_RATIO}}

  要求：
  1. 使用清晰的象征物或场景表达核心观点
  2. 画面含义明确，不要太晦涩
  3. 适合抽象话题、方法论、认知类文章
