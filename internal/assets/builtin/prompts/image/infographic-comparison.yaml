name: infographic-comparison
kind: image
description: 对比型信息图
version: "1.0"
archetype: infographic
primary_use_case: infographic
recommended_aspect_ratios:
  - 3:4
  - 16:9
default_aspect_ratio: 3:4
metadata:
  author: geekjourneyx
  provenance: original
tags:
  - infographic
  - comparison
  - contrast
examples:
  - A/B 对比
  - before/after
variables:
  - ARTICLE_TITLE
  - ARTICLE_SUMMARY
  - KEY_POINTS
  - VISUAL_STYLE
  - ASPECT_RATIO
template: |
  为文章生成对比型信息图提示词。
  标题：{{ARTICLE_TITLE}}
  摘要：{{ARTICLE_SUMMARY}}
  核心要点：{{KEY_POINTS}}
  风格：{{VISUAL_STYLE}}
  画幅：{{ASPECT_RATIO}}

  要求：
  1. 明确左右或上下对比结构
  2. 每一侧信息并列对齐，便于快速比较
  3. 适合优缺点、方案比较、前后变化
