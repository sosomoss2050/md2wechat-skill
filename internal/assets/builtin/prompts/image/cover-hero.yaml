name: cover-hero
kind: image
description: 强视觉锚点的英雄型封面
version: "1.0"
archetype: cover
primary_use_case: cover
recommended_aspect_ratios:
  - 16:9
default_aspect_ratio: 16:9
metadata:
  author: geekjourneyx
  provenance: original
tags:
  - cover
  - hero
  - strong-anchor
examples:
  - 科技趋势文章
  - 商业观点文章
variables:
  - ARTICLE_TITLE
  - ARTICLE_SUMMARY
  - KEYWORDS
  - VISUAL_STYLE
  - ASPECT_RATIO
template: |
  为公众号文章生成强视觉中心的封面图提示词。
  标题：{{ARTICLE_TITLE}}
  摘要：{{ARTICLE_SUMMARY}}
  关键词：{{KEYWORDS}}
  风格：{{VISUAL_STYLE}}
  画幅：{{ASPECT_RATIO}}

  要求：
  1. 单一强视觉锚点，主体明确
  2. 适合 16:9 横版首图
  3. 画面冲击力强，但不要复杂拥挤
