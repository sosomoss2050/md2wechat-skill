name: infographic-default
kind: image
description: 通用文章信息图提示词模板
version: "1.0"
variables:
  - ARTICLE_TITLE
  - KEY_POINTS
  - VISUAL_STYLE
template: |
  为文章生成信息图提示词。
  标题：{{ARTICLE_TITLE}}
  核心要点：{{KEY_POINTS}}
  视觉风格：{{VISUAL_STYLE}}

  要求：
  1. 信息结构清晰，可视化层级明确
  2. 适合公众号插图，不要过度装饰
  3. 突出对比、流程或总结信息
