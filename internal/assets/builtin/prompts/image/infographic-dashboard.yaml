name: infographic-dashboard
kind: image
description: 指标、数据、KPI 仪表盘型信息图
version: "1.0"
archetype: infographic
primary_use_case: infographic
recommended_aspect_ratios:
  - 3:4
  - 16:9
default_aspect_ratio: 3:4
metadata:
  author: geekjourneyx
  provenance: original
tags:
  - infographic
  - dashboard
  - metrics
examples:
  - 增长指标解读
  - 运营数据总结
variables:
  - ARTICLE_TITLE
  - ARTICLE_SUMMARY
  - KEY_POINTS
  - VISUAL_STYLE
  - ASPECT_RATIO
template: |
  为文章生成仪表盘型信息图提示词。
  标题：{{ARTICLE_TITLE}}
  摘要：{{ARTICLE_SUMMARY}}
  核心要点：{{KEY_POINTS}}
  风格：{{VISUAL_STYLE}}
  画幅：{{ASPECT_RATIO}}

  要求：
  1. 用图表、模块和数字卡片呈现信息
  2. 体现数据看板和专业分析感
  3. 适合指标、运营、KPI、市场数据内容
