schema_version: "1"
name: notice
version: "1.0.0"
since: "1.5.0"
category: conversion
serves: [readability, attention]
content_types: [tutorial, report, announcement]
industry: [general]
tags: [conversion, notice, disclaimer, conditions, warning]
position: body
when_to_use: |
  适用说明、风险、前提、不适用场景。
  适合在内容开始前告知读者使用条件和注意事项。
when_not_to_use: |
  简单的提示用 callout（sprint4）；
  纯 FAQ 内容用 faq 模块。
pairs_well_with: [checklist, audience-fit, specs]
avoid_combining_with: []
anti_pattern: |
  没有任何满足 2 列的行导致渲染失败；
  标签关键词写错导致样式无法匹配；
  每行都用风险标签失去区分度。
rows:
  delimiter: "|"
  min_columns: 2
  schema:
    - name: label
      description: "标签词，自动识别语气：适合/推荐/适用/建议→适合样式；不适合/避免/慎用/禁用→不适合样式；风险/注意/警告→风险样式；前提/要求/条件/准备→前提样式"
    - name: description
      description: 说明内容
    - name: supplement
      description: 补充说明（可省略）
example: |
  :::notice[适用说明]
  适合 | 干货长文、教程拆解、白皮书、活动总结 | 适合需要结构感和复用性的内容
  前提 | 先把信息分层 | 不要把所有信息都塞进一个模块
  风险 | 模块堆太多会抢正文 | 一篇文章保留 3 到 6 个重点模块更稳
  不适合 | 特别短的快讯 | 这类内容通常一两个基础模块就够了
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#notice"
