schema_version: "1"
name: quote-card
version: "1.0.0"
since: "1.5.0"
category: sprint4
serves: [attention, memorability]
content_types: [opinion, announcement, brand]
industry: [general]
tags: [sprint4, quote-card, pullquote, cover-quote, featured]
position: opening
when_to_use: |
  文章开头立主张，收尾升华，大字金句展示。
  适合封面引用、核心判断展示、大字金句。
when_not_to_use: |
  普通引用用 quote；
  数据展示用 infographic type:data。
pairs_well_with: [hero, verdict, infographic]
avoid_combining_with: []
anti_pattern: |
  缺少 text（JSON key 是 text，不是 quote 或 content）导致渲染失败；
  内容超过 2 句话失去金句的冲击力；
  source 写太长（应该简短）。
fields:
  required: []
  optional:
    - name: text
      description: 金句内容（JSON key：text，必填。写成单行 JSON 对象：{"text":"...","source":"..."}）
      example: "结构先于风格，骨架决定气质"
    - name: source
      description: 来源说明（JSON key：source）
      example: "内容设计原则"
    - name: author
      description: 作者姓名（JSON key：author，与 source 互补）
      example: "极客旅程"
example: |
  :::quote-card
  {"text":"结构先于风格，骨架决定气质","source":"内容设计原则"}
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#quote-card"
