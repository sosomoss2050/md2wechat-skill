schema_version: "1"
name: tweet
version: "1.0.0"
since: "1.5.0"
category: sprint4
serves: [attention, memorability]
content_types: [opinion, announcement]
industry: [general]
tags: [sprint4, tweet, social, citation, viral]
position: body
when_to_use: |
  社交媒体引用、用户评价、名人观点展示。
  适合引用推文、微博等社交媒体内容增加可信度。
when_not_to_use: |
  普通引用用 quote；
  访谈摘录用 quote-card。
pairs_well_with: [quote, verdict, cases]
avoid_combining_with: []
anti_pattern: |
  缺少 text（JSON key 是 text，不是 content）导致渲染失败；
  author 的 JSON key 是 name，date 的 JSON key 是 timestamp，写错 key 不会渲染；
  handle 不加 @ 前缀影响视觉识别；
  内容写成第三人称描述而非直接引用。
fields:
  required:
    - name: text
      description: 推文内容（JSON key：text，不是 content）
      example: "这套模块系统真的让我的内容制作效率提升了不止一倍。"
  optional:
    - name: name
      description: 发推者姓名（JSON key：name，不是 author）
      example: "内容创作者"
    - name: handle
      description: 账号（JSON key：handle，@xxx 格式）
      example: "@creator"
    - name: timestamp
      description: 时间戳文字（JSON key：timestamp，不是 date）
      example: "2026-01-01"
    - name: likes
      description: 点赞数（JSON key：likes，显示在右下角）
      example: "1.2K"
    - name: avatar
      description: 头像 URL（JSON key：avatar，无则显示姓名首字母）
      example: "https://example.com/avatar.png"
example: |
  :::tweet
  {"name":"内容创作者","handle":"@creator","text":"这套模块系统真的让内容制作效率提升了不止一倍。","timestamp":"2026-01-01"}
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#tweet"
