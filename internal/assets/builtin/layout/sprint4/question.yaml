schema_version: "1"
name: question
version: "1.0.0"
since: "1.5.0"
category: sprint4
serves: [readability, conversion]
content_types: [tutorial, report]
industry: [general]
tags: [sprint4, question, qa, faq-inline, interactive]
position: body
when_to_use: |
  FAQ、读者问题、学习测验。
  适合在正文中嵌入问答，比 faq 更轻量。
when_not_to_use: |
  商业转化场景的顾虑处理用 faq；
  单个问题直接写正文。
pairs_well_with: [faq, callout, summary]
avoid_combining_with: []
anti_pattern: |
  内容必须写成 JSON 数组格式：[{"q":"...","a":"..."}]，不支持 pipe 分隔行；
  q（问题）和 a（回答）是 JSON key 的实际名称，不是 question 和 answer；
  问题写成陈述句而非疑问句；
  回答写太长应该拆成正文段落。
fields:
  required: []
  optional:
    - name: q
      description: 问题内容（JSON key：q，以问句形式表达）
      example: "模块是否支持所有主题？"
    - name: a
      description: 回答内容（JSON key：a，简洁直接）
      example: "是的，所有主题都会渲染这些模块。"
example: |
  :::question
  [{"q":"模块是否支持所有主题？","a":"是的，所有主题都会渲染这些模块。"}]
  :::
metadata:
  author: md2wechat
  provenance: builtin
  inspired_by: "advanced-layout-modules-guide.md#question"
