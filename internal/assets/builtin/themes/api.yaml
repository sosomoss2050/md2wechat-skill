# Elegant 系列 - 层次丰富，左边框递减 + 渐变背景
elegant_themes:
  - name: elegant-gold
    description: "金色系，层次丰富，左边框递减"

  - name: elegant-green
    description: "绿色系，层次丰富，左边框递减"

  - name: elegant-blue
    description: "蓝色系，层次丰富，左边框递减"

