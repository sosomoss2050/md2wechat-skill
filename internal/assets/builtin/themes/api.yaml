# md2wechat API 主题配置
# 版本混合: v1.0 (基础6个 + 精选主题) + v2.0 (新系列32个)
# 更新: 支持内测 API (https://md2wechat.app) 的 48 个专业主题

name: api-collection
type: api
version: "mixed"
description: "md2wechat API 主题集 - 48 个专业主题"

# ============================================
# v1.0 基础主题 (6 个) - 原生内置
# ============================================
basic_themes:
  - name: default
    version: "1.0"
    description: "微信经典风格，温暖舒适"

  - name: bytedance
    version: "1.0"
    description: "科技现代风格，简洁利落"

  - name: apple
    version: "1.0"
    description: "视觉渐变风格，精致优雅"

  - name: sports
    version: "1.0"
    description: "活力动感风格，充满能量"

  - name: chinese
    version: "1.0"
    description: "古典雅致风格，书卷气息"

  - name: cyber
    version: "1.0"
    description: "未来科技风格，霓虹光影"

# ============================================
# v2.0 新增主题 (32 个) - 内测 API 新增
# ============================================

# Minimal 系列 - 干净克制，纯色文字无装饰
minimal_themes:
