    description: "藏青色系，干净克制"

  - name: minimal-gray
    description: "灰色系，干净克制"

  - name: minimal-sky
    description: "天蓝色系，干净克制"

# Focus 系列 - 居中对称，标题上下双横线
focus_themes:
